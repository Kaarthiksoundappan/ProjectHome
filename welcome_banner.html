<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Banner – Soundappan & Family</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* Print size: 6ft wide × 3ft tall */
  @page {
    size: 72in 36in landscape;
    margin: 0;
  }

  html, body {
    width: 72in;
    height: 36in;
    background: #0d0a07;
  }

  /* ── Banner shell: fixed 6ft × 3ft for print ── */
  .banner-wrap {
    width: 72in;
    height: 36in;
    position: relative;
  }

  .banner {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;

    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, #3a1a06 0%, #1c0b02 60%, #0d0602 100%);
  }

  /* Subtle texture overlay */
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 50%, rgba(210,140,30,0.06) 0%, transparent 45%),
      radial-gradient(circle at 85% 50%, rgba(210,140,30,0.06) 0%, transparent 45%);
    pointer-events: none;
  }

  /* ── Gold double border ── */
  .frame-outer {
    position: absolute;
    inset: 2.5%;
    border: 0.08in solid #b8820e;
    pointer-events: none;
    z-index: 2;
  }
  .frame-inner {
    position: absolute;
    inset: 3.5%;
    border: 0.04in solid rgba(184,130,14,0.35);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Corner florals ── */
  .corner {
    position: absolute;
    font-size: 1.2in;
    color: #c9920f;
    opacity: 0.75;
    z-index: 3;
    line-height: 1;
  }
  .corner.tl { top: 1.2%; left: 1.5%; }
  .corner.tr { top: 1.2%; right: 1.5%; transform: scaleX(-1); }
  .corner.bl { bottom: 1.2%; left: 1.5%; transform: scaleY(-1); }
  .corner.br { bottom: 1.2%; right: 1.5%; transform: scale(-1); }

  /* ── Main content ── */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
    width: 70%;
  }

  /* Small auspicious line at very top */
  .top-motif {
    font-size: 1.1in;
    color: #c9920f;
    letter-spacing: 0.5em;
    opacity: 0.8;
    margin-bottom: 3%;
  }

  /* WELCOME */
  .welcome {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 4.5in;
    color: #e8c46a;
    letter-spacing: 0.25em;
    line-height: 1;
    text-shadow:
      0 0 1in rgba(232,196,106,0.25),
      0 0.02in 0.05in rgba(0,0,0,0.9);
    margin-bottom: 3%;
  }

  /* Ornamental divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1em;
    width: 85%;
    margin-bottom: 3%;
  }
  .divider-line {
    flex: 1;
    height: 0.03in;
    background: linear-gradient(to right, transparent, #b8820e 40%, #b8820e 60%, transparent);
  }
  .divider-diamond {
    width: 0.35in;
    height: 0.35in;
    background: #c9920f;
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* Soundappan & Family */
  .host-name {
    font-family: 'Cormorant Garamond', 'IM Fell English', Georgia, serif;
    font-weight: 300;
    font-style: italic;
    font-size: 3.5in;
    color: #f5f0e8;
    letter-spacing: 0.06em;
    line-height: 1.1;
    text-shadow: 0 0.05in 0.4in rgba(0,0,0,0.8);
    margin-bottom: 2.5%;
  }

  /* Second divider */
  .divider2 {
    display: flex;
    align-items: center;
    gap: 0.8em;
    width: 55%;
    margin-bottom: 2.5%;
  }
  .divider2 .divider-line {
    background: linear-gradient(to right, transparent, rgba(184,130,14,0.5) 40%, rgba(184,130,14,0.5) 60%, transparent);
  }
  .divider2 .divider-diamond {
    width: 0.25in;
    height: 0.25in;
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: 0.9in;
    color: #c9920f;
    letter-spacing: 0.35em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="banner-wrap">
  <div class="banner">

    <div class="frame-outer"></div>
    <div class="frame-inner"></div>

    <!-- Corner florals -->
    <div class="corner tl">❧</div>
    <div class="corner tr">❧</div>
    <div class="corner bl">❧</div>
    <div class="corner br">❧</div>

    <div class="content">

      <div class="top-motif">✦ &nbsp; ॐ &nbsp; ✦</div>

      <div class="welcome">Welcome</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
      </div>

      <div class="host-name">Soundappan &amp; Family</div>

      <div class="divider2">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
      </div>

      <div class="subtitle">Griha Pravesh &nbsp;·&nbsp; 8th March 2026</div>

    </div>

  </div>
</div>
</body>
</html>
